name: Unit Test
on:
  workflow_call:
    inputs:
      include_nightly_main:
        description: "Whether to include nightly-main in the Swift version matrix."
        type: boolean
        default: false
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-unit-test
  cancel-in-progress: true
jobs:
  linux-build:
    name: Linux ${{ matrix.os_version }} (Swift ${{ matrix.swift_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift_version: ${{ fromJSON(inputs.include_nightly_main && '["6.2", "6.3", "nightly-main"]' || '["6.2", "6.3"]') }}
        os_version: ["jammy"]
    container:
      image: ${{ (contains(matrix.swift_version, 'nightly') && 'swiftlang/swift') || 'swift' }}:${{ matrix.swift_version }}-${{ matrix.os_version }}
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: crane
          POSTGRES_PASSWORD: crane
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: crane
      POSTGRES_PASSWORD: crane
    steps:
      - name: Swift version
        run: swift --version
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build / Test
        run: swift test --parallel --enable-all-traits --enable-code-coverage --xunit-output junit.xml
      - name: Merge code coverage
        run: |
          CODECOV_DIR=$(dirname "$(swift test --enable-all-traits --show-codecov-path)")
          BIN=$(find "$CODECOV_DIR"/.. -name '*.xctest' -o -name 'CranePostgresNIOTests.so' | head -1)
          llvm-cov export -format "lcov" \
            "$BIN" \
            -ignore-filename-regex="\/Tests\/" \
            -ignore-filename-regex="\/.build\/" \
            -instr-profile="$CODECOV_DIR/default.profdata" \
          > info.lcov
      - name: Install curl
        if: ${{ !cancelled() }}
        run: |
          if ! command -v curl > /dev/null; then
            apt-get update
            apt-get install -y curl
          fi
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6.0.0
        with:
          report_type: test_results
          files: ./junit.xml,./junit-swift-testing.xml
          disable_search: true
          fail_ci_if_error: true
          flags: linux-${{ matrix.os_version }},swift-${{ matrix.swift_version }}
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload code coverage report to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          files: ./info.lcov
          disable_search: true
          fail_ci_if_error: true
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  macos-build:
    name: macOS ${{ matrix.os_version }}
    runs-on: macos-${{ matrix.os_version }}
    strategy:
      fail-fast: false
      matrix:
        os_version: ["26"]
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: crane
      POSTGRES_PASSWORD: crane
    steps:
      - name: Swift version
        id: swift-version
        run: |
          swift --version
          echo "version=$(swift --version | head -n 1 | sed 's/Swift version \([0-9.]*\).*/\1/')" >> $GITHUB_OUTPUT
      - name: Clang version
        run: clang --version
      - name: Start PostgreSQL
        run: |
          brew install postgresql@17
          brew services start postgresql@17
          until pg_isready --host=localhost --port=5432; do sleep 1; done
          createuser --superuser crane
          createdb -U crane crane
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build / Test
        run: swift test --parallel --enable-all-traits --enable-code-coverage --xunit-output junit.xml
      - name: Merge code coverage
        run: |
          CODECOV_DIR=$(dirname "$(swift test --enable-all-traits --show-codecov-path)")
          BIN=$(find "$CODECOV_DIR"/.. -name '*.xctest' -exec echo '{}/Contents/MacOS/crane-postgres-nioPackageTests' \; -o -name 'CranePostgresNIOTests.so' | head -1)
          xcrun llvm-cov export -format "lcov" \
            "$BIN" \
            -ignore-filename-regex="\/Tests\/" \
            -ignore-filename-regex="\/.build\/" \
            -instr-profile="$CODECOV_DIR/default.profdata" \
          > info.lcov
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6.0.0
        with:
          report_type: test_results
          files: ./junit.xml,./junit-swift-testing.xml
          disable_search: true
          fail_ci_if_error: true
          flags: macos-${{ matrix.os_version }},swift-${{ steps.swift-version.outputs.version }}
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload code coverage report to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          files: ./info.lcov
          disable_search: true
          fail_ci_if_error: true
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
